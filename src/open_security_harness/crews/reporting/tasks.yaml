write_final_report_task:
  description: >
    Write the final customer-facing security testing report.

    Target URL:
    {target_url}

    Final report bundle JSON:
    {report_bundle}

    The tool renders the Markdown report and enforces the final structure. Your
    job is to provide concise customer-facing narrative fields that make the
    report easier to read for engineering leads, product owners, and security
    stakeholders. Use this structure:
    - what_was_tested
    - overall_security_posture
    - headline_risks
    - scope_and_limitations or limitations
    - testing_approach
    - finding_narratives keyed by accepted finding ID
    - methodology

    You must call write_final_report exactly once with a structured object.
    Do not submit a complete Markdown report, and do not include a top-level
    report field containing Markdown.
    You may improve readability, but you must not invent findings, affected
    targets, severity, CVSS scores, evidence, or remediation. CVSS values may
    only be included when already present in the bundle; otherwise use
    "Not scored".
    Avoid internal execution-log phrasing unless it is needed to explain scope,
    evidence, or limitations.
  expected_output: >
    Confirmation that write_final_report persisted final-report/report.md.
  agent: writer

review_final_report_task:
  description: >
    Review the generated final customer report against the final report bundle.

    Target URL:
    {target_url}

    Final report bundle JSON:
    {report_bundle}

    Generated report JSON:
    {generated_report}

    You must call submit_final_report_review exactly once. Accept only when the
    report follows the customer-facing structure, includes all accepted findings
    from the bundle, does not invent unsupported findings or CVSS scores, and
    keeps no-finding, inconclusive, failed, or reviewer-rejected tests out of
    the detailed findings section.
  expected_output: >
    A structured review decision for the final report.
  agent: reviewer
