draft_security_test_plan_task:
  description: >
    Create or revise a structured security test plan for the target based on
    the discovery context. Prioritize the tests that are most likely to reduce
    meaningful organisational risk, based on what the discovery output implies
    about the application, its users, data, workflows, exposed integrations, and
    business purpose.

    Target URL:
    {target_url}

    Planner/reviewer iteration:
    {iteration} of {max_attempts}

    Discovery context JSON:
    {discovery_context}

    For engagement-backed planning, review all detailed asset-scoped evidence in
    asset_evidence.live[].discovery and asset_evidence.source[].discovery, and
    use correlation.evidence_links as source/live linkage input. The top-level
    live_discovery and source_discovery entries may be compact availability
    markers; do not stop there when asset_evidence is present. Deterministic
    links are stronger than model-assisted candidates, but candidate links may
    still justify combined hypotheses when the rationale is concrete and useful
    for later verification. Also review execution_capabilities: it describes
    what later execution crews can actually do with attached live and source
    assets.

    Previous plan JSON, if any:
    {previous_plan}

    Previous critic review JSON, if any:
    {previous_critique}

    You must call submit_security_test_plan exactly once. Do not write the
    final Markdown report. The plan argument must be a structured object or a
    JSON string representing an object with these keys:
    - title: string
    - scope_summary: string
    - assumptions: list of strings
    - test_hypotheses: list of objects
    - deferred_test_opportunities: list of objects
    - not_in_scope: list of strings
    - open_questions: list of strings

    Every test_hypotheses item must include:
    - id: stable ID such as AUTH-001, API-001, CORS-001, SPA-001
    - title: short test title
    - surface: api, authentication, session, cors, spa, forms, headers, third-party, infrastructure, or other
    - priority: critical, high, medium, low, or informational
    - organisational_risk: the business or organisational risk this test addresses
    - business_value: why this test is valuable to the organisation now, based on the current understanding of the target
    - hypothesis: what security property should be tested and why
    - evidence: discovery evidence such as URL, endpoint, script, header, or report finding
    - requirements: prerequisites such as credentials, test account, valid token, activation code, safe test data, explicit authorization, or none
    - tools_expected: expected tools or later crew capabilities needed to perform the test
    - preconditions: setup that must be true before testing
    - test_steps: bounded steps a later execution crew could follow
    - expected_secure_behavior: what should happen if the system is secure
    - interesting_failure_modes: what deviations would be worth investigating
    - safety_notes: scope and safety constraints
    - stopping_conditions: when the later tester should stop
    - execution_mode: live, source, combined, or deferred
    - evidence_sources: list containing live and/or source
    - affected_runtime: list of runtime endpoint objects, such as method and url, or an empty list
    - affected_source: list of source evidence objects, such as path, start_line, end_line, symbol, and reason, or an empty list
    - verification_strategy: live-verification, source-inspection, source-guided-live-verification, or blocked-pending-inputs
    - source_assessment_type: static-source-inspection, generated-harness, local-runtime-service, dependency-tool-scan, deferred-live-verification, live-verification, or source-guided-live-verification
    - status: planned

    Prefer fewer, higher-value hypotheses over a broad checklist. Use the
    assessment evidence bundle to infer what the organisation likely needs to protect,
    such as customer data, payment or fraud workflows, administrative access,
    account recovery, operational continuity, regulatory exposure, partner
    integrations, brand trust, or sensitive internal tooling. Do not invent facts
    that are not supported by discovery; when the organisational risk is an
    inference, say so in the hypothesis.

    Use execution_mode deliberately:
    - live when the test can be executed through the live URL only
    - source when source inspection or source tooling is sufficient and no live target is required
    - combined when the immediate executable test must use both source evidence
      and live verification in the same run
    - deferred when valuable testing is blocked by missing source, URL, credentials, build instructions, authorization, or tooling

    If the immediate useful work is source inspection/search/harnessing and any
    live verification is optional, credential-gated, or later, make the active
    hypothesis execution_mode source. Put the later live portion in
    test_steps as conditional future verification or in deferred_test_opportunities.

    Use source_assessment_type deliberately:
    - static-source-inspection when bounded source reads/searches are enough
    - generated-harness when the executor should write a focused /work harness,
      function experiment, fuzz script, or env-variant script
    - local-runtime-service when the executor should start source-derived code or
      a local service and inspect its local HTTP behavior
    - dependency-tool-scan when package manifests, lockfiles, Semgrep, Bandit,
      pip-audit, or similar source tools are central to the test
    - deferred-live-verification when a source clue is useful but the test needs
      a deployment, emulator, simulator, credentials, or external service

    If source_discovery is present in the assessment evidence bundle, use its
    source_index, route records, component_map, gap_analysis, and evidence_refs
    to populate affected_source and evidence_sources. In engagement-backed
    planning, these source details may live under
    asset_evidence.source[].discovery.source_index instead of the top-level
    source_discovery marker. If live_discovery is absent, do not invent runtime
    reachability; use source or deferred modes.
    When source is available, do not defer work solely because it requires
    source inspection, bounded source search, manual grep, source route
    extraction, prompt-template extraction, middleware review, configuration
    review, dependency inspection, or a small generated harness. These are
    executable source tests. Discovery extractor limitations, such as an
    unsupported FastAPI/Ktor/Swift route parser, should become source-mode
    hypotheses when bounded source tools can resolve them.
    In source-only planning, endpoint-shaped source routes are code evidence,
    not proof that a live endpoint is reachable. Do not make curl, browser, or
    live HTTP probing an immediate test step unless live_discovery is present or
    the discovery evidence includes an explicit local/runtime target. Instead,
    source-mode tests should inspect route registration, middleware,
    authorization guards, validation, configuration, dependencies, and existing
    tests. When a generated harness or local runtime would materially improve
    the source-only result, make that explicit in source_assessment_type,
    tools_expected, preconditions, and test_steps. Put live probing into deferred_test_opportunities or a deferred
    hypothesis with requirements_to_proceed when it requires deployment,
    credentials, a local run command, emulator, simulator, or container target.

    If discovery identifies adjacent linked applications, external services,
    subdomains, integrations, or other valuable surfaces that should not be part
    of the immediate test plan, do not discard them. Add them to
    deferred_test_opportunities with:
    - title: short opportunity title
    - surface: linked application, external service, subdomain, integration, unsupported tool surface, or other
    - evidence: discovery evidence such as URL, reference, script, or report finding
    - organisational_risk: why this surface may matter to the organisation
    - business_value: why testing it could be valuable
    - defer_reason: why it is not in the immediate executable hypotheses, such as out-of-scope, needs explicit authorization, missing credentials, missing tool capability, or needs a separate crew
    - requirements_to_proceed: what would be needed to test it later
    - suggested_next_step: concrete next action to decide whether to include it later

    If the previous critic review has blocking findings, address them directly
    in the revised plan.
  expected_output: >
    Confirmation that submit_security_test_plan was called with a structured
    test plan containing detailed hypotheses, requirements, and expected tools.
  agent: planner
