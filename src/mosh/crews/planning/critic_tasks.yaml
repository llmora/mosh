critique_security_test_plan_task:
  description: >
    Review the current security test plan submitted by the planner in this
    iteration. Check whether the hypotheses are evidence-backed, actionable,
    safe, scoped, non-duplicative, clear about requirements and tools, and
    aligned with the most important organisational risks implied by discovery.

    Target URL:
    {target_url}

    Planner/reviewer iteration:
    {iteration} of {max_attempts}

    Structured security test plan JSON submitted by the planner:
    {security_test_plan}

    Planning/execution capability context JSON:
    {planning_context}

    Review this JSON plan. Do not review the planner's prose summary or status
    message if it differs from the structured JSON.

    You must call submit_security_test_plan_critique exactly once. The review
    argument must be a structured object or JSON string with:
    - accepted: boolean
    - summary: string
    - blocking_findings: list of objects with id, severity, issue, required_change
    - non_blocking_suggestions: list of objects with id, suggestion

    Accept only when the plan is detailed enough for later authorised execution
    crews and every hypothesis includes requirements, tools_expected,
    organisational_risk, business_value, execution_mode, evidence_sources,
    affected_runtime, affected_source, verification_strategy, and
    source_assessment_type. Each hypothesis must also include
    execution_readiness and readiness_blockers so the execution crew can
    distinguish ready tests from tests that are planned but preflight-blocked.
    Reject if credentials,
    authorization, test data, safety limits, evidence, expected secure
    behaviour, or business-risk rationale are missing where needed. Reject plans
    that read like a generic security checklist instead of a prioritized plan
    for this organisation and target. If the discovery context mentions linked
    applications, external services, subdomains, integrations, or valuable
    surfaces that are excluded from immediate testing, require them to be
    preserved in deferred_test_opportunities with a clear defer_reason and
    requirements_to_proceed. When discovery_live is absent, reject any immediate
    live or combined hypothesis and any source hypothesis whose steps depend
    only on curl, browser, or live HTTP probing instead of source inspection or
    source tooling. Reject source hypotheses when source_assessment_type is
    missing, generic, or inconsistent with the test_steps and tools_expected.
    When source is available in the planning context, reject plans that defer
    work whose own defer_reason, requirements_to_proceed, or suggested_next_step
    is bounded source inspection, source_search, read_source_slice, manual grep,
    route decorator extraction, prompt-template extraction, middleware review,
    configuration review, dependency inspection, or a generated source harness.
    Discovery extractor gaps are not blockers when source-testing tools can
    resolve them. Require the planner to move the source-executable portion into
    active test_hypotheses with execution_mode source unless the immediate
    executable test truly requires both live and source evidence.
    Prefer active hypotheses when credentials, test accounts, safe test data,
    authorization confirmation, rate-limit permission, or another planned
    hypothesis are the only missing inputs and the current assets/targets make
    the work specific and bounded. In that case, the planner should record the
    missing inputs in requirements/preconditions and safety_notes, and use
    depends_on for prerequisite planned hypotheses. Do not automatically reject
    a deferred live opportunity for those inputs when live execution would be
    costly, state-changing, external-service dependent, or not yet bounded by
    explicit owner authorization, safe test data, or budget; require the defer
    reason and requirements_to_proceed to make that boundary concrete.
    Missing credentials, authorization, safe test data, target mapping, budget,
    or prerequisite work are not blocking reviewer findings when the hypothesis
    is otherwise specific and the missing inputs are recorded in requirements,
    preconditions, safety_notes, depends_on, execution_readiness, and
    readiness_blockers. Treat those as expected execution preflight metadata.
    Reject plans that duplicate the same concrete test in active hypotheses and
    deferred_test_opportunities; require the planner to keep the active
    preflight_blocked/depends_on hypothesis and remove or narrow the deferred
    duplicate.
  expected_output: >
    Confirmation that submit_security_test_plan_critique was called with a
    structured critic decision.
  agent: reviewer
