suggest_evidence_link_candidates_task:
  description: >
    Review the supplied source/live link context:

    {link_context}

    Engagement steer:
    {engagement_steer}

    Apply engagement steer when they do not conflict with mosh safety,
    scope, evidence, linkage, or structured output requirements.

    The context contains existing source route refs and live endpoint refs. Some
    deterministic links may already be present. Identify only additional
    plausible candidate links that are useful for planning and are not already
    deterministic.

    Available linkage tools:
    - load_evidence_ref: inspect full details for an existing source_ref_id or
      live_ref_id.
    - source_search: search bounded nonignored text files inside the source
      asset for an existing source_ref_id.
    - source_read_slice: read a bounded source file slice for an existing
      source_ref_id.
    - live_endpoint_metadata: fetch safe metadata for an already discovered
      live_ref_id using only HEAD, GET, or OPTIONS.
    - submit_evidence_link_candidates: submit final candidates exactly once.

    Rules:
    - Use only source_ref_id and live_ref_id values that appear in the context.
    - Do not invent routes, URLs, files, assets, hosts, methods, or evidence.
    - Do not use tools for general discovery. Use them only to clarify whether
      existing source and live refs likely correspond.
    - Treat source_search, source_read_slice, and live_endpoint_metadata outputs
      as linkage support, not as authoritative discovery facts.
    - Prefer no candidate over a weak or generic association.
    - Candidate links are useful when names, route prefixes, features, handlers,
      framework context, or deployment paths strongly suggest a relationship
      even though exact deterministic path matching did not link them.
    - Keep reasons short and evidence-based.

    You must call submit_evidence_link_candidates exactly once. The tool has
    one argument named links:

    {
      "links": [
        {
          "source_ref_id": "source ref id from context",
          "live_ref_id": "live ref id from context",
          "confidence": "low|medium|high",
          "reason": "short evidence-backed explanation"
        }
      ]
    }
  expected_output: Confirmation that candidate evidence links were submitted.
  agent: evidence_linker
