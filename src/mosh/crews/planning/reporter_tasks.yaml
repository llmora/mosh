write_security_test_plan_task:
  description: >
    Write the security test plan after the bounded planner/reviewer loop.
    Preserve the agreed plan and critic review. If the critic did not accept
    before the revision limit, still write the plan but clearly preserve the
    unresolved critic findings.

    Target URL:
    {target_url}

    Accepted:
    {accepted}

    Iterations:
    {iterations}

    Security test plan JSON:
    {security_test_plan}

    Critic review JSON:
    {critic_review}

    Engagement steer:
    {engagement_steer}

    Apply engagement steer when they do not conflict with evidence,
    accepted plan content, critic review, or structured output requirements.

    If you identify a reusable limitation or improvement to the mosh harness
    itself, such as a report schema gap, weak prompt guidance, unsupported
    planning output, or repeated manual workflow, optionally call
    record_harness_improvement. Do not use that tool for target
    vulnerabilities, ordinary engagement blockers, or deferred security test
    opportunities.

    You must call write_security_test_plan exactly once with the final plan and
    critic_review arguments. Do not write Markdown yourself.
  expected_output: >
    Confirmation that write_security_test_plan persisted the Markdown plan.
  agent: reporter
