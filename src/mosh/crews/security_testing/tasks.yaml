execute_security_test_task:
  description: >
    Execute the ready security test hypothesis.

    Target URL:
    {target_url}

    Test ID:
    {test_id}

    Executor/reviewer revision:
    {revision} of {max_attempts}

    Hypothesis JSON:
    {hypothesis}

    Engagement JSON:
    {engagement}

    Effective target mappings JSON:
    {targets}

    Previous reviewer feedback JSON, if any:
    {previous_review}

    Use run_security_command for commands that need the disposable Docker
    workspace. You may install packages, write scripts, or compile small helper
    programs inside the container if needed. Keep commands scoped and
    reproducible. Respect the hypothesis safety notes, stopping conditions, and
    engagement rate limits. Do not use real credentials or tokens in prose; the
    command tool redacts known credential values in logs.

    Treat the effective target mappings as canonical for execution. URLs in the
    hypothesis are evidence from discovery and may name production systems; when
    an alternative target is present in the mappings, rewrite discovered paths
    onto that mapped target instead of probing the original evidence URL. Do not
    attempt production URLs just to confirm they are blocked when an alternative
    target is available.

    You must call submit_security_test_evidence exactly once with a structured
    object containing:
    - status: finding, no-finding, inconclusive, or failed
    - hypothesis_validated: true, false, or partial for the original planned
      hypothesis, independent of adjacent hardening observations
    - original_hypothesis_result: short explanation of whether the original
      hypothesis was confirmed, disproved, or only partially assessed
    - summary: short execution summary
    - observations: evidence from commands and responses
    - discovery_updates: optional list of new discovery facts learned during
      testing that should be fed back into the discovery report and future
      planning. Use this for newly confirmed entry points, endpoints,
      technologies, versions, service behavior, headers, or other app-surface
      facts. Each item should include type, detail, confidence, and evidence.
    - artifacts: useful generated outputs such as recommended policies,
      proof-of-concept payloads, endpoint inventories, generated scripts, auth
      matrices, or remediation snippets. Preserve artifacts even if the test
      needs a reviewer-requested re-run, unless the artifact is unsafe or known
      invalid.
    - residual_findings: separate hardening gaps or adjacent vulnerabilities
      discovered while testing the hypothesis, each with its own title,
      severity, evidence, and recommendation. Do not promote residual findings
      to the original hypothesis status or priority.
    - finding: object only for a validated vulnerability being reported, with
      its own title, severity, impact, recommendation, and evidence. Do not
      reuse the planned priority as finding severity.
    - result: conclusion supported by the evidence
    - safety_notes: safety limits followed and any stop conditions reached
    - follow_up: remaining work, if any

    If the original hypothesis is disproved but residual hardening gaps exist,
    use status no-finding or inconclusive unless you submit a separately
    supported finding object with a retitled issue and its own severity.
  expected_output: >
    Confirmation that submit_security_test_evidence was called with structured
    evidence for the current hypothesis.
  agent: executor

review_security_test_evidence_task:
  description: >
    Review the executor evidence for the current security test.

    Target URL:
    {target_url}

    Test ID:
    {test_id}

    Executor/reviewer revision:
    {revision} of {max_attempts}

    Hypothesis JSON:
    {hypothesis}

    Evidence JSON:
    {evidence}

    Effective target mappings JSON:
    {targets}

    Treat the effective target mappings as canonical for review. URLs in the
    hypothesis may be production discovery evidence, while the executor may
    correctly test mapped staging/preprod alternatives. Do not request a re-run
    against the original hypothesis URLs when an effective alternative target is
    present. A request to test production is only appropriate when production is
    the effective target mapping or the evidence actually used an out-of-scope
    target.

    You must call submit_security_test_review exactly once with:
    - accepted: boolean
    - summary: concise review decision
    - requested_changes: list of specific re-runs or missing observations if not accepted
    - safety_concerns: list of safety issues, if any
    - accepted_artifacts: list of artifact names that are valid/useful enough
      for the final report
    - rejected_artifacts: list of artifact names that should not be relied on,
      with reasons in requested_changes or safety_concerns

    Accept only when the evidence supports the result, the target and endpoints
    are in scope, and the safety notes/stopping conditions were respected.
    Reject evidence as inconsistent when status is finding but the finding
    object is missing/empty, or when the summary/result says no vulnerability,
    no bypass, false positive, not applicable, model mismatch, or no remediation
    required. Confirming secure behavior is a no-finding, not a finding. Also
    reject evidence when the original hypothesis is disproved but residual
    hardening gaps are promoted to the original title, status, or planned
    priority. Planning priority is not finding severity; any residual issue
    must be submitted as its own retitled finding with severity, impact,
    recommendation, and evidence.
    Critique generated artifacts separately from the evidence conclusion: an
    evidence package may need rework while a generated policy, script, endpoint
    list, or remediation snippet is still useful and should be preserved with
    caveats.
  expected_output: >
    Confirmation that submit_security_test_review was called with a structured
    review decision.
  agent: reviewer

write_executed_security_test_report_task:
  description: >
    Write the final Markdown artifact for this executed security test.

    Target URL:
    {target_url}

    Test ID:
    {test_id}

    Hypothesis JSON:
    {hypothesis}

    Evidence JSON:
    {evidence}

    Reviewer JSON:
    {review}

    Commands JSON:
    {commands}

    Execution bundle JSON:
    {execution_bundle}

    Effective target mappings JSON:
    {targets}

    Write the report against the effective target mappings. Distinguish
    discovery evidence URLs from execution targets. Do not state that production
    remains required for this executed test when a staging/preprod alternative
    was the approved effective target; such production testing belongs only as a
    separate future-scope note if explicitly useful. If the original hypothesis
    was disproved, do not render it as Finding Confirmed. Residual hardening
    gaps belong in residual_findings or in a separate retitled finding object
    with its own severity; do not inherit the planned priority as finding
    severity.

    You must call write_executed_test_report exactly once. The report argument
    must be a structured object with:
    - status: finding, no-finding, inconclusive, or failed
    - summary
    - result
    - evidence
    - resolution: developer/app-owner guidance for resolving any identified
      issue. Include concrete configuration, code, header, control, or process
      changes where the evidence supports them. If there is no finding, explain
      that no remediation is required for this hypothesis.
    - useful_artifacts: artifacts to include from the execution bundle,
      including useful artifacts from earlier rejected or partial attempts when
      they remain valid with caveats
    - finding: object or null
    - follow_up
  expected_output: >
    Confirmation that write_executed_test_report persisted executed_tests/{test_id}.md.
  agent: reporter
