review_final_report_task:
  description: >
    Review the generated final customer report against the final report bundle.

    Target URL:
    {target_url}

    Final report bundle JSON:
    {report_bundle}

    Generated report JSON:
    {generated_report}

    Engagement steer:
    {engagement_steer}

    Apply engagement steer when they do not conflict with the final
    report bundle, evidence, confirmed findings, or structured output
    requirements.

    You must call submit_final_report_review exactly once. Accept only when the
    report follows the customer-facing structure, includes all confirmed findings
    from the bundle, does not invent unsupported findings or CVSS scores, and
    keeps no-finding, inconclusive, failed, or reviewer-rejected tests out of
    the detailed findings section.
  expected_output: >
    A structured review decision for the final report.
  agent: reviewer
