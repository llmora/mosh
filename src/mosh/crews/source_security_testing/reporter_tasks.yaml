write_source_security_test_report_task:
  description: >
    Write the final Markdown artifact for this executed source security test.

    Source root:
    {source}

    Test ID:
    {test_id}

    Hypothesis JSON:
    {hypothesis}

    Evidence JSON:
    {evidence}

    Reviewer JSON:
    {review}

    Commands JSON:
    {commands}

    Source reads JSON:
    {source_reads}

    Source searches JSON:
    {source_searches}

    Workspace files JSON:
    {workspace_files}

    Local processes JSON:
    {local_processes}

    Local HTTP requests JSON:
    {local_requests}

    Execution bundle JSON:
    {execution_bundle}

    Effective target mappings JSON:
    {targets}

    Write the report as a source-backed execution result. Distinguish source
    evidence, local runtime evidence, and any future live verification. Do not
    imply that production was tested when the evidence came from source or a
    local runtime. When workspace files, local processes, or local HTTP
    requests exist, include a clearly labelled dynamic source evidence section
    so readers can audit generated harnesses and local runtime behavior without
    reading raw metadata. If the original hypothesis was disproved, do not
    render it as Finding Confirmed. Residual hardening gaps belong in
    residual_findings or in a separate retitled finding object with its own
    severity; do not inherit the planned priority as finding severity.

    You must call write_source_executed_test_report exactly once. The report
    argument must be a structured object with:
    - status: finding, no-finding, inconclusive, or failed
    - summary
    - result
    - evidence
    - resolution: developer/app-owner guidance for resolving any identified
      issue. Include concrete code, configuration, control, or process changes
      where the evidence supports them. If there is no finding, explain that no
      remediation is required for this hypothesis.
    - useful_artifacts: artifacts to include from the execution bundle,
      including useful artifacts from earlier rejected or partial attempts when
      they remain valid with caveats
    - finding: object or null
    - follow_up
  expected_output: >
    Confirmation that write_source_executed_test_report persisted
    executed_tests/{test_id}.md.
  agent: source_reporter
