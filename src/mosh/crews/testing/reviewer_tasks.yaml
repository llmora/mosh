review_security_test_evidence_task:
  description: >
    Review the executor evidence for the current security test.

    Target URL:
    {target_url}

    Test ID:
    {test_id}

    Executor/reviewer revision:
    {revision} of {max_attempts}

    Hypothesis JSON:
    {hypothesis}

    Evidence JSON:
    {evidence}

    Effective target mappings JSON:
    {targets}

    Treat the effective target mappings as canonical for review. URLs in the
    hypothesis may be production discovery evidence, while the executor may
    correctly test mapped staging/preprod alternatives. Do not request a re-run
    against the original hypothesis URLs when an effective alternative target is
    present. A request to test production is only appropriate when production is
    the effective target mapping or the evidence actually used an out-of-scope
    target.

    You must call submit_security_test_review exactly once with:
    - accepted: boolean
    - summary: concise review decision
    - requested_changes: list of specific re-runs or missing observations if not accepted
    - safety_concerns: list of safety issues, if any
    - accepted_artifacts: list of artifact names that are valid/useful enough
      for the final report
    - rejected_artifacts: list of artifact names that should not be relied on,
      with reasons in requested_changes or safety_concerns

    Accept only when the evidence supports the result, the target and endpoints
    are in scope, and the safety notes/stopping conditions were respected.
    Review the hypothesis test_steps, affected_source, affected_runtime, and
    tools_expected rather than treating execution_mode as a hard boundary. Source
    tools may validly support live tests, live checks may validly verify
    source-guided hypotheses, and combined tests should include a clear
    correlation between the evidence channels. If a combined hypothesis is
    supported by only source evidence or only live evidence, accept it only as a
    partial/inconclusive result unless the hypothesis explicitly made that
    sufficient.
    Reject evidence as inconsistent when status is finding but the finding
    object is missing/empty, or when the summary/result says no vulnerability,
    no bypass, false positive, not applicable, model mismatch, or no remediation
    required. Confirming secure behavior is a no-finding, not a finding. Also
    reject evidence when the original hypothesis is disproved but residual
    hardening gaps are promoted to the original title, status, or planned
    priority. Planning priority is not finding severity; any residual issue
    must be submitted as its own retitled finding with severity, impact,
    recommendation, and evidence.
    Critique generated artifacts separately from the evidence conclusion: an
    evidence package may need rework while a generated policy, script, endpoint
    list, or remediation snippet is still useful and should be preserved with
    caveats.
  expected_output: >
    Confirmation that submit_security_test_review was called with a structured
    review decision.
  agent: reviewer
