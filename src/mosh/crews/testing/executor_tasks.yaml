execute_security_test_task:
  description: >
    Execute the ready security test hypothesis.

    Target URL:
    {target_url}

    Source root, if an attached source asset is available:
    {source}

    Test ID:
    {test_id}

    Executor/reviewer revision:
    {revision} of {max_attempts}

    Hypothesis JSON:
    {hypothesis}

    Engagement JSON:
    {engagement}

    Effective target mappings JSON:
    {targets}

    Engagement steer:
    {engagement_steer}

    Apply engagement steer when they do not conflict with mosh safety,
    authorization, scope, effective target mappings, evidence, tool-use, or
    structured output requirements.

    If you identify a reusable limitation or improvement to the mosh harness
    itself, such as a missing bounded test tool, weak prompt guidance,
    unsupported source/runtime workflow, or repeated manual execution work,
    optionally call record_harness_improvement. Do not use that tool for target
    vulnerabilities, normal preflight blockers, missing customer credentials,
    authorization, safe test data, or target mappings.

    Source discovery context JSON:
    {source_context}

    Evidence links JSON:
    {evidence_links}

    Previous reviewer feedback JSON, if any:
    {previous_review}

    Execute the planned hypothesis faithfully. Follow the hypothesis test_steps,
    affected_source, affected_runtime, tools_expected, requirements,
    preconditions, safety_notes, and stopping_conditions. Treat execution_mode as
    a planning hint about expected evidence, not as a hard tool boundary. Do not
    invent a different test objective; if a planned step cannot be executed,
    submit inconclusive or failed evidence with the blocker instead of running an
    unrelated substitute test.

    Use any available bounded tool that is needed for the planned hypothesis:
    - run_security_command for live target checks from the disposable Docker
      workspace.
    - source_search and read_source_slice for bounded source inspection.
    - write_workspace_file and run_source_command for focused local harnesses,
      dependency checks, or source-derived experiments with /source mounted
      read-only and /work writable.
    - start_source_process, request_local_http, and stop_source_process for
      source-derived local runtime checks. Always stop any process you start.
    Keep commands scoped and reproducible. Respect the hypothesis safety notes,
    stopping conditions, and engagement rate limits. Do not use real credentials
    or tokens in prose; command tools redact known credential values in logs.

    Treat the effective target mappings as canonical for execution. URLs in the
    hypothesis are evidence from discovery and may name production systems; when
    an alternative target is present in the mappings, rewrite discovered paths
    onto that mapped target instead of probing the original evidence URL. Do not
    attempt production URLs just to confirm they are blocked when an alternative
    target is available.

    You must call submit_security_test_evidence exactly once with top-level tool
    arguments. Do not wrap these fields inside an evidence object. Submit:
    - status: finding, no-finding, inconclusive, or failed
    - hypothesis_validated: true, false, or partial for the original planned
      hypothesis, independent of adjacent hardening observations
    - original_hypothesis_result: short explanation of whether the original
      hypothesis was confirmed, disproved, or only partially assessed
    - summary: short execution summary
    - observations: evidence from commands, source reads/searches, local
      processes, local HTTP requests, and live responses
    - source_evidence: concrete path, start_line, end_line, snippet_hash, and
      reason entries when source evidence was used
    - live_evidence: concrete target, method, request/response, command, or
      observation entries when live evidence was used
    - correlation: for combined tests, explain how source evidence shaped the
      live check or how live behavior confirmed/disproved the source hypothesis
    - discovery_updates: optional list of new discovery facts learned during
      testing that should be fed back into the discovery report and future
      planning. Use this for newly confirmed entry points, endpoints,
      technologies, versions, service behavior, headers, or other app-surface
      facts. Each item should include type, detail, confidence, and evidence;
      prefer a list of update objects over a grouped dictionary.
    - artifacts: useful generated outputs such as recommended policies,
      proof-of-concept payloads, endpoint inventories, generated scripts, auth
      matrices, or remediation snippets. Preserve artifacts even if the test
      needs a reviewer-requested re-run, unless the artifact is unsafe or known
      invalid.
    - residual_findings: separate hardening gaps or adjacent vulnerabilities
      discovered while testing the hypothesis, each with its own title,
      severity, evidence, and recommendation. Do not promote residual findings
      to the original hypothesis status or priority.
    - finding: object only for a validated vulnerability being reported, with
      its own title, severity, impact, recommendation, and evidence. Do not
      reuse the planned priority as finding severity.
    - result: conclusion supported by the evidence
    - safety_notes: safety limits followed and any stop conditions reached
    - follow_up: remaining work, if any

    If the original hypothesis is disproved but residual hardening gaps exist,
    use status no-finding or inconclusive unless you submit a separately
    supported finding object with a retitled issue and its own severity.
    For combined hypotheses, source-only or live-only evidence is partial unless
    the hypothesis itself says that one evidence channel is sufficient.
  expected_output: >
    Confirmation that submit_security_test_evidence was called with structured
    evidence for the current hypothesis.
  agent: executor
