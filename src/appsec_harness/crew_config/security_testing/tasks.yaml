execute_security_test_task:
  description: >
    Execute the ready security test hypothesis.

    Target URL:
    {target_url}

    Test ID:
    {test_id}

    Executor/reviewer revision:
    {revision} of {max_attempts}

    Hypothesis JSON:
    {hypothesis}

    Engagement JSON:
    {engagement}

    Effective target mappings JSON:
    {targets}

    Previous reviewer feedback JSON, if any:
    {previous_review}

    Use run_security_command for commands that need the disposable Docker
    workspace. You may install packages, write scripts, or compile small helper
    programs inside the container if needed. Keep commands scoped and
    reproducible. Respect the hypothesis safety notes, stopping conditions, and
    engagement rate limits. Do not use real credentials or tokens in prose; the
    command tool redacts known credential values in logs.

    Treat the effective target mappings as canonical for execution. URLs in the
    hypothesis are evidence from discovery and may name production systems; when
    an alternative target is present in the mappings, rewrite discovered paths
    onto that mapped target instead of probing the original evidence URL. Do not
    attempt production URLs just to confirm they are blocked when an alternative
    target is available.

    You must call submit_security_test_evidence exactly once with a structured
    object containing:
    - status: finding, no-finding, inconclusive, or failed
    - summary: short execution summary
    - observations: evidence from commands and responses
    - result: conclusion supported by the evidence
    - safety_notes: safety limits followed and any stop conditions reached
    - follow_up: remaining work, if any
  expected_output: >
    Confirmation that submit_security_test_evidence was called with structured
    evidence for the current hypothesis.
  agent: security_test_executor

review_security_test_evidence_task:
  description: >
    Review the executor evidence for the current security test.

    Target URL:
    {target_url}

    Test ID:
    {test_id}

    Executor/reviewer revision:
    {revision} of {max_attempts}

    Hypothesis JSON:
    {hypothesis}

    Evidence JSON:
    {evidence}

    Effective target mappings JSON:
    {targets}

    Treat the effective target mappings as canonical for review. URLs in the
    hypothesis may be production discovery evidence, while the executor may
    correctly test mapped staging/preprod alternatives. Do not request a re-run
    against the original hypothesis URLs when an effective alternative target is
    present. A request to test production is only appropriate when production is
    the effective target mapping or the evidence actually used an out-of-scope
    target.

    You must call submit_security_test_review exactly once with:
    - accepted: boolean
    - summary: concise review decision
    - requested_changes: list of specific re-runs or missing observations if not accepted
    - safety_concerns: list of safety issues, if any

    Accept only when the evidence supports the result, the target and endpoints
    are in scope, and the safety notes/stopping conditions were respected.
  expected_output: >
    Confirmation that submit_security_test_review was called with a structured
    review decision.
  agent: security_test_reviewer

write_executed_security_test_report_task:
  description: >
    Write the final Markdown artifact for this executed security test.

    Target URL:
    {target_url}

    Test ID:
    {test_id}

    Hypothesis JSON:
    {hypothesis}

    Evidence JSON:
    {evidence}

    Reviewer JSON:
    {review}

    Commands JSON:
    {commands}

    Effective target mappings JSON:
    {targets}

    Write the report against the effective target mappings. Distinguish
    discovery evidence URLs from execution targets. Do not state that production
    remains required for this executed test when a staging/preprod alternative
    was the approved effective target; such production testing belongs only as a
    separate future-scope note if explicitly useful.

    You must call write_executed_test_report exactly once. The report argument
    must be a structured object with:
    - status: finding, no-finding, inconclusive, or failed
    - summary
    - result
    - evidence
    - finding: object or null
    - follow_up
  expected_output: >
    Confirmation that write_executed_test_report persisted executed_tests/{test_id}.md.
  agent: security_test_reporter
