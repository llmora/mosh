crawl_application_task:
  description: >

    Crawl the target website to discover the visible application structure and surface area.
    The crawler should identify publicly reachable pages, routes, forms, query parameters,
    JavaScript files, CSS files, static assets, API endpoints, redirects, linked domains,
    cookies, response headers, authentication-related pages, and other observable behaviours.
    The crawl must remain within the authorised scope provided by the orchestrator. It must not
    attempt exploitation, brute forcing, destructive actions, credential attacks, bypasses, or
    intrusive testing. The purpose of this task is discovery and mapping only.

    Target URL:
    
    {target_url}

    Scope rules:
    - Crawl depth: {max_depth}
    - Max pages: {max_pages}

  expected_output: >
    A structured application discovery map containing:
    - Target URL and crawl timestamp
    - Discovered pages and routes
    - Discovered candidates and candidate follow-up crawl decisions
    - Discovered API endpoints
    - HTTP methods observed or inferred
    - Forms and input fields
    - Query parameters
    - JavaScript, CSS, and static assets
    - External domains and third-party services
    - Cookies and notable response headers
    - Authentication, login, registration, password reset, or account-related paths
    - Redirects and error pages
    - Notes on crawl limitations, blocked areas, or assumptions
    
  agent: crawler

compile_components_task:
  description: >
    Analyse the discovery data produced by the crawler and compile a visible software bill of
    materials for the target application. Identify frontend frameworks, JavaScript libraries,
    backend technology indicators, CMS platforms, analytics tools, CDN providers, payment
    providers, authentication services, third-party scripts, API technologies, and other
    observable components.

    Findings must be based on evidence gathered during discovery, such as HTTP headers,
    cookies, HTML source, JavaScript bundles, script references, package metadata, source maps,
    manifest files, framework-specific routes, API patterns, CDN URLs, and other visible artefacts.

    Do not guess beyond the available evidence. Where a technology is inferred rather than
    confirmed, mark it clearly with a confidence level and explain the reason.
  expected_output: >
    A structured SBOM-style inventory containing:
    - Component or technology name
    - Component type, such as framework, library, CDN, analytics, CMS, API, authentication, payment, or hosting
    - Version number where visible
    - Evidence source, such as header, script URL, HTML marker, API response, cookie, or file path
    - Confidence level: confirmed, likely, possible, or unknown
    - Related discovered URLs or assets
    - Notes on uncertainty or missing version information
    - Any components that could not be identified but appear relevant

  agent: sbom_compiler

write_report_task:
  description: >
    Summarise the full application discovery results using the crawler output and the SBOM
    compiler output. The summary should explain what the application appears to be, what was
    discovered, which parts of the application are visible, what technologies were identified,
    and what areas require further review in later security assessment phases.
    The summary must clearly separate confirmed findings from inferred findings. It should avoid
    making vulnerability claims unless they are directly supported by the discovery data. This task
    is not responsible for exploitation, vulnerability validation, or risk scoring.

    You must call the write_discovery_report tool exactly once. Do not write
    free-form Markdown yourself. Instead, pass a complete structured report in
    the report argument. The report-writing tool renders report.md from that
    structure using a fixed section order so repeated runs remain comparable.

    The report argument must contain these keys:
    - title: string
    - executive_summary: string
    - application_description: string
    - target_scope: list of objects with title, detail, confidence, evidence
    - key_discovered_areas: list of objects with title, detail, confidence, evidence
    - discovered_routes: list of objects with url, status, content_type, notes, evidence
    - api_endpoints: list of objects with endpoint, method, status, purpose, confidence, evidence
    - forms: list of objects with page, type, fields, method, notes
    - technologies: list of objects with name, type, version, confidence, evidence
    - third_party_services: list of objects with name, type, version, confidence, evidence
    - authentication_observations: list of objects with title, detail, confidence, evidence
    - confirmed_findings: list of objects with title, detail, confidence, evidence
    - inferred_findings: list of objects with title, detail, confidence, evidence
    - limitations: list of objects with title, detail, confidence, evidence
    - recommended_next_steps: list of objects with priority, action, rationale
    - appendix: list of objects with title, detail, confidence, evidence

    Use empty lists when a section has no entries. Keep headings implicit by
    using the keys above; the report-writing tool controls Markdown headings.
    
  expected_output: >
    Confirmation that write_discovery_report persisted a clear Markdown
    application discovery report. The report tool argument must contain content for:
    - Executive summary
    - Target and discovery scope
    - High-level application description
    - Key discovered areas of the application
    - Important routes, endpoints, forms, and APIs
    - Technology and SBOM summary
    - Third-party services and external dependencies
    - Authentication and account-related observations
    - Discovery limitations and blind spots
    - Confirmed findings versus inferred findings
    - Recommended next steps for security assessment
  
  agent: summarizer
