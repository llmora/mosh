draft_security_test_plan_task:
  description: >
    Create or revise a structured security test plan for the target based on
    the discovery context. Prioritize the tests that are most likely to reduce
    meaningful organisational risk, based on what the discovery output implies
    about the application, its users, data, workflows, exposed integrations, and
    business purpose.

    Target URL:
    {target_url}

    Planner/critic iteration:
    {iteration} of {max_attempts}

    Discovery context JSON:
    {discovery_context}

    Previous plan JSON, if any:
    {previous_plan}

    Previous critic review JSON, if any:
    {previous_critique}

    You must call submit_security_test_plan exactly once. Do not write the
    final Markdown report. The plan argument must be a structured object or a
    JSON string representing an object with these keys:
    - title: string
    - scope_summary: string
    - assumptions: list of strings
    - test_hypotheses: list of objects
    - deferred_test_opportunities: list of objects
    - not_in_scope: list of strings
    - open_questions: list of strings

    Every test_hypotheses item must include:
    - id: stable ID such as AUTH-001, API-001, CORS-001, SPA-001
    - title: short test title
    - surface: api, authentication, session, cors, spa, forms, headers, third-party, infrastructure, or other
    - priority: critical, high, medium, low, or informational
    - organisational_risk: the business or organisational risk this test addresses
    - business_value: why this test is valuable to the organisation now, based on the current understanding of the target
    - hypothesis: what security property should be tested and why
    - evidence: discovery evidence such as URL, endpoint, script, header, or report finding
    - requirements: prerequisites such as credentials, test account, valid token, activation code, safe test data, explicit authorization, or none
    - tools_expected: expected tools or later crew capabilities needed to perform the test
    - preconditions: setup that must be true before testing
    - test_steps: bounded steps a later execution crew could follow
    - expected_secure_behavior: what should happen if the system is secure
    - interesting_failure_modes: what deviations would be worth investigating
    - safety_notes: scope and safety constraints
    - stopping_conditions: when the later tester should stop
    - status: planned

    Prefer fewer, higher-value hypotheses over a broad checklist. Use the
    discovery context to infer what the organisation likely needs to protect,
    such as customer data, payment or fraud workflows, administrative access,
    account recovery, operational continuity, regulatory exposure, partner
    integrations, brand trust, or sensitive internal tooling. Do not invent facts
    that are not supported by discovery; when the organisational risk is an
    inference, say so in the hypothesis.

    If discovery identifies adjacent linked applications, external services,
    subdomains, integrations, or other valuable surfaces that should not be part
    of the immediate test plan, do not discard them. Add them to
    deferred_test_opportunities with:
    - title: short opportunity title
    - surface: linked application, external service, subdomain, integration, unsupported tool surface, or other
    - evidence: discovery evidence such as URL, reference, script, or report finding
    - organisational_risk: why this surface may matter to the organisation
    - business_value: why testing it could be valuable
    - defer_reason: why it is not in the immediate executable hypotheses, such as out-of-scope, needs explicit authorization, missing credentials, missing tool capability, or needs a separate crew
    - requirements_to_proceed: what would be needed to test it later
    - suggested_next_step: concrete next action to decide whether to include it later

    If the previous critic review has blocking findings, address them directly
    in the revised plan.
  expected_output: >
    Confirmation that submit_security_test_plan was called with a structured
    test plan containing detailed hypotheses, requirements, and expected tools.
  agent: security_test_planner

critique_security_test_plan_task:
  description: >
    Review the current security test plan submitted by the planner in this
    iteration. Check whether the hypotheses are evidence-backed, actionable,
    safe, scoped, non-duplicative, clear about requirements and tools, and
    aligned with the most important organisational risks implied by discovery.

    Target URL:
    {target_url}

    Planner/critic iteration:
    {iteration} of {max_attempts}

    Structured security test plan JSON submitted by the planner:
    {security_test_plan}

    Review this JSON plan. Do not review the planner's prose summary or status
    message if it differs from the structured JSON.

    You must call submit_security_test_plan_critique exactly once. The review
    argument must be a structured object or JSON string with:
    - accepted: boolean
    - summary: string
    - blocking_findings: list of objects with id, severity, issue, required_change
    - non_blocking_suggestions: list of objects with id, suggestion

    Accept only when the plan is detailed enough for later authorised execution
    crews and every hypothesis includes requirements, tools_expected,
    organisational_risk, and business_value. Reject if credentials,
    authorization, test data, safety limits, evidence, expected secure
    behaviour, or business-risk rationale are missing where needed. Reject plans
    that read like a generic security checklist instead of a prioritized plan
    for this organisation and target. If the discovery context mentions linked
    applications, external services, subdomains, integrations, or valuable
    surfaces that are excluded from immediate testing, require them to be
    preserved in deferred_test_opportunities with a clear defer_reason and
    requirements_to_proceed.
  expected_output: >
    Confirmation that submit_security_test_plan_critique was called with a
    structured critic decision.
  agent: security_test_critic

write_security_test_plan_task:
  description: >
    Finalize the security test plan after the bounded planner/critic loop.
    Preserve the agreed plan and critic review. If the critic did not accept
    before the revision limit, still write the plan but clearly preserve the
    unresolved critic findings.

    Target URL:
    {target_url}

    Accepted:
    {accepted}

    Iterations:
    {iterations}

    Security test plan JSON:
    {security_test_plan}

    Critic review JSON:
    {critic_review}

    You must call write_security_test_plan exactly once with the final plan and
    critic_review arguments. Do not write Markdown yourself.
  expected_output: >
    Confirmation that write_security_test_plan persisted security_test_plan.md.
  agent: security_test_finalizer

refine_engagement_template_task:
  description: >
    Refine the deterministic engagement template for the target.

    Target URL:
    {target_url}

    Final security test plan JSON:
    {security_test_plan}

    Current engagement template JSON:
    {engagement_template}

    You must call write_refined_engagement_template exactly once with a
    structured object or JSON string.

    Rules:
    - Do not invent credentials, hosts, tokens, contact details, or safe test data.
    - Existing engagement_template.yaml values are user-owned configuration. Do
      not replace a filled value with null, empty strings, empty lists, or generic
      placeholders.
    - Authorization is assumed true for owned applications.
    - Keep production targets as defaults.
    - Keep alternative targets optional. If an alternative target is absent, testing uses production.
    - Do not block unauthenticated or passive tests just because credentials would help with comparison.
    - Keep the file simple and editable by a human. Do not add status,
      needed_for, required_answers, execution_readiness, long notes, or other
      explanatory metadata to the engagement template.
    - Reduce duplicate questions.
    - Keep all required schema keys:
      engagement, targets, contacts, limits, credentials, safe_test_data.
    - Readiness, blockers, missing inputs, and questions belong in
      security_test_plan.md or preflight.md, not in engagement_template.yaml.
  expected_output: >
    Confirmation that write_refined_engagement_template persisted engagement_template.yaml.
  agent: engagement_template_refiner
