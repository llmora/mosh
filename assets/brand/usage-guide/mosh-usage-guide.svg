<text x="72" y="790" fill="#0D0F12" font-family="Space Grotesk, Sora, Inter, Arial, sans-serif" font-size="34" font-weight="800">Usage rules</text>

<text x="72" y="840" fill="#2A2E33" font-family="Inter, Arial, sans-serif" font-size="24">Do: use strong contrast, preserve proportions, keep clear space, use SVG for web/docs.</text>
<text x="72" y="882" fill="#2A2E33" font-family="Inter, Arial, sans-serif" font-size="24">Don’t: stretch, skew, rotate, recolor randomly, add effects, or place on busy backgrounds.</text>
<text x="72" y="924" fill="#2A2E33" font-family="Inter, Arial, sans-serif" font-size="24">Typography: Space Grotesk or Sora for brand; JetBrains Mono for CLI/documentation accents.</text>

<text x="1040" y="790" fill="#0D0F12" font-family="Space Grotesk, Sora, Inter, Arial, sans-serif" font-size="34" font-weight="800">Clear space</text>
<rect x="1040" y="820" width="360" height="120" rx="18" fill="#FFFFFF" stroke="#CBD0D8" stroke-dasharray="8 8"/>
<g transform="translate(1168 800) scale(0.22)">
  
<g id="mosh-mark">
  <!-- Split abstract M silhouette.
       Two filled halves create a clear center split and a lower center point. -->

