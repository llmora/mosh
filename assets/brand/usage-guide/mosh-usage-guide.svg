<text x="72" y="520" fill="#0D0F12" font-family="Space Grotesk, Sora, Inter, Arial, sans-serif" font-size="34" font-weight="800">Palette</text>

<rect x="72" y="555" width="120" height="80" rx="14" fill="#0D0F12" stroke="#CBD0D8"/>
