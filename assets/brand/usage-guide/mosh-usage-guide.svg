<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="mosh one-page usage guide">
  <title>mosh one-page usage guide</title>
  <rect width="1600" height="1000" fill="#F6F7F8"/>
  
<text x="72" y="90" fill="#0D0F12" font-family="Space Grotesk, Sora, Inter, Arial, sans-serif" font-size="54" font-weight="800">mosh brand usage guide</text>
<text x="72" y="134" fill="#2A2E33" font-family="Inter, Arial, sans-serif" font-size="24">Controlled chaos for application security testing.</text>

<rect x="72" y="190" width="680" height="250" rx="24" fill="#0D0F12"/>
<g transform="translate(120 216) scale(0.38)">
  
<g id="mosh-mark">
  <!-- Split abstract M silhouette.
       Two filled halves create a clear center split and a lower center point. -->

  <path
    d="M92 390
       L92 112
       L256 248
       L256 340
       L158 258
       L158 390
       Z"
    fill="#FFFFFF"
  />

  <path
    d="M256 248
       L420 112
       L420 390
       L354 390
       L354 258
       L256 340
       Z"
    fill="#FF5A1F"
  />

  <!-- Perspective harness path / controlled execution steps.
       Wider toward the viewer, like a zebra crossing in perspective. -->

  <path d="M226 358H286L300 378H212L226 358Z" fill="#FF5A1F"/>
  <path d="M206 398H306L326 426H186L206 398Z" fill="#FF5A1F"/>
  <path d="M184 442H328L354 474H158L184 442Z" fill="#FF5A1F"/>
</g>
</g>
