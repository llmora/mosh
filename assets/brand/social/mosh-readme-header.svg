    <stop offset="100%" stop-color="#0D0F12" stop-opacity="0"/>
  </radialGradient>
</defs>

<rect width="1600" height="640" fill="url(#glow)"/>

<g opacity="0.46" stroke="#FF5A1F" stroke-width="3" fill="none">
