[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "appsec-harness"
version = "0.1.0"
description = "Agent-coordinated application security discovery harness."
requires-python = ">=3.11"
dependencies = ["crewai>=1.0.0"]

[project.scripts]
appsec-harness = "appsec_harness.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
include = ["appsec_harness*"]

[tool.setuptools.package-data]
appsec_harness = ["crew_config/*.yaml"]
